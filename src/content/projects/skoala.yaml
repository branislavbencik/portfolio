sections:
  - label: Context
    title: A growing content library needed a production system
    description: "Early lessons were hand-crafted in Figma and coded one by one. As the curriculum scaled, this manual handoff became a production bottleneck. We built a CMS so editors could publish independently without developer intervention."
    images:
      - src: /images/skoala/skoala-1.png
        alt: Curriculum roadmap with four distinct content types
        caption: "The content roadmap required four distinct content types, each with its own interactive logic and production constraints."
        background: true
        paddingSides: all
        borderSides: all
  - label: Core content model
    title: The teaching module was our primary building block
    description: "It is the \"full package\" for the classroom. Teachers open a single module and find everything needed for a lesson: no hunting for files or on-the-fly preparation required."
    images:
      - src: /images/skoala/skoala-2.png
        alt: MVP slide taxonomy — system-generated, static, inputs, outputs
        caption: ""
        background: false
        paddingSides: none
        borderSides: all
      - src: /images/skoala/skoala-3.png
        alt: Module breakdown — presentation, teaching guidance, student activity, print materials
        caption: ""
        background: false
        borderSides: none
  - label: Key design decision
    title: Start constrained, expand intentionally
    description: "To build the classroom presenter, we needed a set of reusable slides. A fully flexible slide builder would have invited scope creep. I deliberately lobbied for as few initial building blocks as possible, only adding new components when the constraints became genuine blockers. This enforced focus kept the project lean and ensured the codebase remained maintainable."
    images:
      - src: /images/skoala/skoala-4.png
        alt: Teaching module — published Předlužení detail page
        caption: "MVP slide taxonomy designed to prioritize reuse over component bloat."
        background: true
        paddingSides: all
        borderSides: all
        width: 640
      - src: /images/skoala/skoala-5.png
        alt: Slide editor in the CMS
        caption: "Slide editor in CMS: composing presentations from predefined slide types."
        background: true
        paddingSides: none
      - src: /images/skoala/skoala-6.png
        alt: CMS editor view
        caption: "I designed the building blocks to handle layout and styling automatically. Editors focus purely on content while the system maintains visual consistency."
        background: true
        paddingSides: none
  - label: Key design decision
    title: Edit live content without breaking it
    description: "Live lessons cannot change unpredictably while teachers are planning. I architected a Git-inspired lifecycle: editors branch into drafts and review changes before merging to \"Published.\" This ensures safe updates without technical overhead."
    images:
      - src: /images/skoala/skoala-7.png
        alt: Content lifecycle diagram
        caption: "Content lifecycle: from first draft to archive, with branching for safe edits."
        background: false
        width: 640
      - src: /images/skoala/skoala-8.png
        alt: Lesson editor with status
        caption: "Status, ownership and version history made the production state visible to everyone involved."
        background: false
        borderSides: all
  - label: Outcome
    title: From volume to coverage
    description: "Skoala grew into 150+ hours of content covering primary and secondary school years. The library now includes 140 lesson plans and 20 interactive games."
    images: []
    awards:
      - logo: /images/skoala/skoala-award-eifle.png
        name: EIFLE Award
        description: Won Children's Education Program of the Year
      - logo: /images/skoala/skoala-award-maia.png
        name: MAIA Award
        description: Nominated in top 16
  - label: Reflection
    title: Systems as guardrails
    description: "I’ve learned that hard constraints drive invention. Restricting the block library didn’t slow us down, and the results never lacked variety. The content team handled the constraints with grace, proving we could be very inventive with the building blocks we already had."
    images: []
