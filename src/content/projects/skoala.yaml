sections:
  - label: Key design decision
    title: One content model, four outputs
    description: "A lesson plan isn't a blog post. It's a set of interconnected content blocks that need to work as a classroom projection, a teaching brief, a student quiz, and a printed worksheet. So we built the CMS around one content model feeding four outputs."
    images:
      - src: /images/skoala/skoala-ws1-i1.png
        alt: Four curriculum formats
        caption: One lesson plan, four outputs. Each pulls its own subset of content blocks.
        background: false
      - src: /images/skoala/skoala-ws1-i2.png
        alt: CMS editor view
        caption: "A quiz question in the CMS and its rendered output on the student's phone. Editors control content. The system controls layout."
        background: true
  - label: Key design decision
    title: Edit live content without breaking it
    description: "Teachers build their week around a live lesson plan. We borrowed from git version control: edits happen on a branch, the live version stays untouched, and changes merge back only when ready."
    images:
      - src: /images/skoala/skoala-ws2-i1.png
        alt: Content lifecycle diagram
        caption: "Content lifecycle: from first draft to archive, with branching for safe edits."
        background: false
        width: 720
      - src: /images/skoala/skoala-ws2-i2.png
        alt: Lesson editor with status
        caption: Lesson plan list with status, ownership, and version history.
        background: true
